name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    # 템플릿 레포에서만 실행 — 파생 프로젝트에서는 silent skip
    if: github.repository == 'DJMAXJOAA/claude-code-linear-template'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify framework structure
        run: |
          FAIL=0

          # 필수 파일 존재 확인
          REQUIRED_FILES=(
            "CLAUDE.md"
            "README.md"
            ".claude/rules/pipeline.md"
            ".claude/rules/docs-writing.md"
            ".claude/templates/framework.md"
            ".claude/templates/context.md"
            ".claude/templates/setup.md"
          )
          for f in "${REQUIRED_FILES[@]}"; do
            test -f "$f" || { echo "FAIL: $f not found"; FAIL=1; }
          done

          # 필수 스킬 존재 확인 (이름 기반)
          REQUIRED_SKILLS=(
            "dev-pipeline" "gen-hub" "gen-plan" "implement" "issue-close"
            "triage" "feedback" "investigation" "verify" "test"
          )
          for s in "${REQUIRED_SKILLS[@]}"; do
            test -f ".claude/skills/$s/SKILL.md" || { echo "FAIL: skill $s not found"; FAIL=1; }
          done

          # 필수 커맨드 존재 확인 (이름 기반)
          REQUIRED_COMMANDS=("등록" "활성화" "점검" "커밋" "피드백" "조사" "검증" "병합" "현황")
          for c in "${REQUIRED_COMMANDS[@]}"; do
            test -f ".claude/commands/${c}.md" || { echo "FAIL: command ${c} not found"; FAIL=1; }
          done

          # CLAUDE.md 줄 수 제한
          LINES=$(wc -l < CLAUDE.md)
          [ "$LINES" -le 200 ] || { echo "FAIL: CLAUDE.md ${LINES} lines > 200"; FAIL=1; }

          [ "$FAIL" -eq 0 ] || exit 1
          echo "All checks passed"

      - name: Create clean archive
        run: |
          TAG=${GITHUB_REF_NAME}
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          git archive --format=tar.gz --prefix=${REPO_NAME}-${TAG}/ -o release-${TAG}.tar.gz HEAD
          git archive --format=zip --prefix=${REPO_NAME}-${TAG}/ -o release-${TAG}.zip HEAD

      - name: Build release notes
        run: |
          TAG=${GITHUB_REF_NAME}
          NOTES_FILE=$(mktemp)
          echo "NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

          # annotated tag의 메시지를 추출 (%(contents)는 커밋 메시지를 반환하는 버그가 있어 cat-file 사용)
          TAG_TYPE=$(git cat-file -t "$TAG" 2>/dev/null || echo "unknown")
          if [ "$TAG_TYPE" = "tag" ]; then
            # annotated tag: 헤더(object/type/tag/tagger) 이후 빈 줄 다음부터가 메시지
            git cat-file -p "$TAG" | sed '1,/^$/d' | sed '/^$/d' > "$NOTES_FILE"
          fi

          if [ -s "$NOTES_FILE" ]; then
            # annotation이 있으면 하단에 Full Changelog 링크 추가
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              printf '\n\n---\n\n**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
                "$GITHUB_REPOSITORY" "$PREV_TAG" "$TAG" >> "$NOTES_FILE"
            fi
          else
            # annotation이 없으면 GitHub API로 auto-generated notes 생성
            gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
              -f tag_name="$TAG" -q .body > "$NOTES_FILE"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          TAG=${GITHUB_REF_NAME}
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            release-${TAG}.tar.gz \
            release-${TAG}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
